services:
  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- API ----------
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - session_data:/app/sessions/storage
    restart: unless-stopped

  # ---------- Instagram Worker ----------
  instagram_worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WORKER_PLATFORM=instagram
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - session_data:/app/sessions/storage
    restart: unless-stopped

  # ---------- TikTok Worker ----------
  tiktok_worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WORKER_PLATFORM=tiktok
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - session_data:/app/sessions/storage
    restart: unless-stopped

  # ---------- Facebook Worker ----------
  facebook_worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WORKER_PLATFORM=facebook
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - session_data:/app/sessions/storage
    restart: unless-stopped

volumes:
  redis_data:
  session_data:
